{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">✦</div>
  <h1>Choose a new password</h1>
  <p class="muted">Resetting for <strong>{{ email }}</strong></p>
  <form method="POST" novalidate>
    {{ form.hidden_tag() }}
    <label>{{ form.password.label }} {{ form.password(class_="input") }}</label>
    {% for e in form.password.errors %}<small class="err">{{ e }}</small>{% endfor %}
    <label>{{ form.confirm.label }} {{ form.confirm(class_="input") }}</label>
    {% for e in form.confirm.errors %}<small class="err">{{ e }}</small>{% endfor %}
    {{ form.submit(class_="btn btn-full") }}
  </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">✦</div>
  <h1>Forgot password?</h1>
  <p class="muted">Enter your email and we'll send you a reset link.</p>
  <form method="POST" novalidate>
    {{ form.hidden_tag() }}
    <label>{{ form.email.label }} {{ form.email(class_="input") }}</label>
    {% for e in form.email.errors %}<small class="err">{{ e }}</small>{% endfor %}
    {{ form.submit(class_="btn btn-full") }}
  </form>
  <p class="muted center mt-12">
    Remembered it? <a href="{{ url_for('auth.login') }}">Back to login</a>
  </p>
</div>
{% endblock %}
